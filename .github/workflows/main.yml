name:
 on: [push]
 jobs:
   build:
     runs-on: ubuntu-latest
     steps:
     -uses: actions/checkout@v3
     -name: Set up Actions
     -uses: actions/setup-python@v2
      with:
         python-version: "3.9"
     -name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
     -name: running test
        run: |
           cd src
           python -m pytest addition.py
